packages:
  - type: github_release
    repo_owner: azu
    repo_name: dockerfile-pin
    description: Pin Dockerfile and docker-compose images to digests
    asset: "dockerfile-pin_{{.OS}}_{{.Arch}}.tar.gz"
    overrides:
      - goos: windows
        asset: "dockerfile-pin_{{.OS}}_{{.Arch}}.zip"
    files:
      - name: dockerfile-pin
